name: CMake Build with Tests 

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure
      run: cmake -H. -B_build -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build _build

    - name: Test
      run: cmake --build _build --target test
